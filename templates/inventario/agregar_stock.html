{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h4>📦 Agregar stock</h4>

    <p><strong>Producto:</strong> {{ producto.nombre }}</p>
    <p><strong>Sucursal:</strong> {{ sucursal.nombre }}</p>
    <p><strong>Stock actual:</strong> {{ inventario.cantidad }}</p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Cantidad a agregar</label>
            <input type="number" name="cantidad" class="form-control" min="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Motivo</label>
            <input type="text" name="motivo" class="form-control" value="COMPRA">
        </div>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea name="observaciones" class="form-control"></textarea>
        </div>

        <button type="submit" class="btn btn-success">
            ➕ Agregar Stock
        </button>

        <a href="{% url 'inventario:listar_productos' %}" class="btn btn-secondary">
            Volver
        </a>
    </form>
</div>
{% endblock %}
