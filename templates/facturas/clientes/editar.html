{% extends 'base.html' %}

{% block title %}Editar Cliente - SISBAR{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <a href="{% url 'inventario:lista_clientes' %}" class="btn btn-outline-secondary mb-3">
                <i class="bi bi-arrow-left me-2"></i>Volver
            </a>
            <h1 class="h2 mb-1">✏️ Editar Cliente</h1>
            <p class="text-muted">{{ cliente.nombre_completo }}</p>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="row g-3">
                            <!-- Tipo de Documento -->
                            <div class="col-md-4">
                                <label for="tipo_documento" class="form-label">Tipo de Documento *</label>
                                <select name="tipo_documento" id="tipo_documento" class="form-select" required>
                                    <option value="CC" {% if cliente.tipo_documento == 'CC' %}selected{% endif %}>Cédula de Ciudadanía</option>
                                    <option value="CE" {% if cliente.tipo_documento == 'CE' %}selected{% endif %}>Cédula de Extranjería</option>
                                    <option value="NIT" {% if cliente.tipo_documento == 'NIT' %}selected{% endif %}>NIT</option>
                                    <option value="TI" {% if cliente.tipo_documento == 'TI' %}selected{% endif %}>Tarjeta de Identidad</option>
                                    <option value="PP" {% if cliente.tipo_documento == 'PP' %}selected{% endif %}>Pasaporte</option>
                                    <option value="RC" {% if cliente.tipo_documento == 'RC' %}selected{% endif %}>Registro Civil</option>
                                </select>
                            </div>

                            <!-- Número de Documento -->
                            <div class="col-md-8">
                                <label for="numero_documento" class="form-label">Número de Documento *</label>
                                <input type="text" name="numero_documento" id="numero_documento" 
                                       class="form-control" value="{{ cliente.numero_documento }}" required>
                            </div>

                            <!-- Nombre Completo -->
                            <div class="col-12">
                                <label for="nombre_completo" class="form-label">Nombre Completo / Razón Social *</label>
                                <input type="text" name="nombre_completo" id="nombre_completo" 
                                       class="form-control" value="{{ cliente.nombre_completo }}" required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" name="email" id="email" 
                                       class="form-control" value="{{ cliente.email }}">
                            </div>

                            <!-- Teléfono -->
                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="text" name="telefono" id="telefono" 
                                       class="form-control" value="{{ cliente.telefono }}">
                            </div>

                            <!-- Dirección -->
                            <div class="col-md-8">
                                <label for="direccion" class="form-label">Dirección</label>
                                <input type="text" name="direccion" id="direccion" 
                                       class="form-control" value="{{ cliente.direccion }}">
                            </div>

                            <!-- Ciudad -->
                            <div class="col-md-4">
                                <label for="ciudad" class="form-label">Ciudad</label>
                                <input type="text" name="ciudad" id="ciudad" 
                                       class="form-control" value="{{ cliente.ciudad }}">
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1 py-3">
                                <i class="bi bi-save me-2"></i>
                                Actualizar Cliente
                            </button>
                            <a href="{% url 'inventario:lista_clientes' %}" 
                               class="btn btn-outline-secondary py-3">
                                <i class="bi bi-x-circle me-2"></i>
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
